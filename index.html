<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#efbd93">
  <meta name="description" content="A WebGPU-first volumetric cozy island rendered from NexusEngine domain descriptors.">
  <title>My Cozy Island — WebGPU Volumetric Atmosphere</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #efbd93;
      color: #fffaf0;
    }

    * { box-sizing: border-box; }

    html,
    body,
    #app {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #efbd93;
    }

    body { overscroll-behavior: none; }

    #game {
      position: fixed;
      inset: 0;
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
      outline: none;
    }

    #loader {
      position: fixed;
      left: 50%;
      bottom: max(28px, env(safe-area-inset-bottom));
      z-index: 20;
      width: min(420px, calc(100vw - 40px));
      transform: translateX(-50%);
      padding: 14px 16px 15px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 20px;
      background: rgba(28, 54, 59, 0.72);
      box-shadow: 0 18px 48px rgba(22, 43, 49, 0.24);
      backdrop-filter: blur(18px) saturate(1.15);
      transition: opacity 0.5s ease, transform 0.5s ease;
      pointer-events: none;
    }

    #loader.is-complete {
      opacity: 0;
      transform: translate(-50%, 12px);
    }

    #loader-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 10px;
      font-size: 12px;
      font-weight: 780;
      letter-spacing: 0.045em;
      text-transform: uppercase;
    }

    #loader-kicker { opacity: 0.62; }
    #loader-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    #loader-track {
      height: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.17);
    }

    #loader-fill {
      width: 0;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #aee2d8, #fff4ca 68%, #ffd0a8);
      box-shadow: 0 0 18px rgba(255, 239, 193, 0.52);
      transition: width 0.25s ease;
    }

    #debug {
      position: fixed;
      top: max(14px, env(safe-area-inset-top));
      right: max(14px, env(safe-area-inset-right));
      z-index: 15;
      min-width: 235px;
      max-width: calc(100vw - 28px);
      padding: 12px 14px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 14px;
      background: rgba(15, 30, 36, 0.72);
      color: #effff9;
      font: 600 11px/1.55 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      white-space: pre-wrap;
      box-shadow: 0 14px 35px rgba(0, 0, 0, 0.2);
      backdrop-filter: blur(15px);
      pointer-events: none;
    }

    #debug[hidden] { display: none; }

    #hint {
      position: fixed;
      left: max(14px, env(safe-area-inset-left));
      bottom: max(14px, env(safe-area-inset-bottom));
      z-index: 8;
      padding: 8px 11px;
      border-radius: 999px;
      background: rgba(19, 47, 52, 0.4);
      color: rgba(255, 255, 255, 0.75);
      font-size: 11px;
      letter-spacing: 0.025em;
      backdrop-filter: blur(8px);
      pointer-events: none;
    }

    #error {
      position: fixed;
      left: 16px;
      right: 16px;
      bottom: 16px;
      z-index: 50;
      max-height: 50vh;
      margin: 0;
      overflow: auto;
      padding: 16px;
      border: 1px solid rgba(255, 190, 190, 0.35);
      border-radius: 14px;
      background: rgba(74, 13, 19, 0.92);
      color: #ffe8e8;
      font: 12px/1.5 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      white-space: pre-wrap;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
    }

    #error[hidden] { display: none; }

    @media (max-width: 700px) {
      #hint { display: none; }
      #loader { bottom: 18px; }
    }

    @media (prefers-reduced-motion: reduce) {
      #loader,
      #loader-fill { transition: none; }
    }
  </style>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.185.0/build/three.webgpu.js",
        "three/webgpu": "https://cdn.jsdelivr.net/npm/three@0.185.0/build/three.webgpu.js",
        "three/tsl": "https://cdn.jsdelivr.net/npm/three@0.185.0/build/three.tsl.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.185.0/examples/jsm/",
        "nexusengine": "https://cdn.jsdelivr.net/gh/LuminaryLabs-Dev/NexusEngine@38229f59c22cb40024ffd13a9f48040de759f5d7/src/index.js"
      }
    }
  </script>
</head>
<body>
  <main id="app">
    <canvas id="game" role="application" aria-label="Interactive volumetric view of My Cozy Island" tabindex="0"></canvas>

    <section id="loader" aria-live="polite">
      <div id="loader-header">
        <span id="loader-kicker">My Cozy Island</span>
        <span id="loader-text">Preparing Core World and atmospheric domains</span>
      </div>
      <div id="loader-track" aria-hidden="true"><div id="loader-fill"></div></div>
    </section>

    <aside id="debug" aria-label="Renderer diagnostics" hidden></aside>
    <div id="hint">Scroll to descend · drag to orbit · WASD after landing · H diagnostics</div>
    <pre id="error" role="alert" hidden></pre>
  </main>

  <script type="module" src="./src/main-cloudform.js?v=core-world-1"></script>
</body>
</html>
