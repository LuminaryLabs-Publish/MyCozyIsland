<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#efad7f">
  <meta name="description" content="A minimal Three.js palm-tree menu for My Cozy Island.">
  <title>My Cozy Island</title>
  <style>
    :root { color-scheme:dark; font-family:Inter,ui-rounded,"SF Pro Rounded",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:linear-gradient(#ef9d76,#efc493 52%,#75b8aa); color:#fffaf0; }
    * { box-sizing:border-box; }
    html,body { width:100%; height:100%; margin:0; overflow:hidden; background:linear-gradient(#ef9d76,#efc493 52%,#75b8aa); }
    body { overscroll-behavior:none; }
    button { font:inherit; }
    #game-preload,#menu-scene { position:fixed; inset:0; width:100%; height:100%; border:0; }
    #game-preload { z-index:1; opacity:0; pointer-events:none; transition:opacity .8s ease; background:#efad7f; }
    #menu-scene { z-index:2; display:block; transition:opacity .8s ease,filter .8s ease; }
    #play { position:fixed; right:max(7vw,28px); bottom:max(10vh,36px); z-index:3; min-width:190px; min-height:58px; padding:0 34px; border:1px solid rgba(255,255,255,.48); border-radius:999px; background:linear-gradient(180deg,#fff2ac,#e9bd70); color:#36564d; box-shadow:0 18px 46px rgba(34,62,57,.3),inset 0 1px rgba(255,255,255,.82); font-size:15px; font-weight:900; letter-spacing:.08em; text-transform:uppercase; cursor:pointer; transition:opacity .22s ease,transform .22s ease,filter .22s ease; }
    #play:hover:not(:disabled) { transform:translateY(-2px) scale(1.015); filter:brightness(1.04); }
    #play:active:not(:disabled) { transform:translateY(0) scale(.99); }
    #play:disabled { cursor:default; opacity:.58; }
    body.is-entering #game-preload { opacity:1; pointer-events:auto; }
    body.is-entering #menu-scene { opacity:0; filter:blur(7px); }
    body.is-entering #play { opacity:0; transform:translateY(12px); pointer-events:none; }
    @media (max-width:700px) { #play { right:50%; bottom:max(8vh,28px); min-width:180px; transform:translateX(50%); } #play:hover:not(:disabled) { transform:translateX(50%) translateY(-2px) scale(1.015); } #play:active:not(:disabled) { transform:translateX(50%) scale(.99); } body.is-entering #play { transform:translateX(50%) translateY(12px); } }
    @media (prefers-reduced-motion:reduce) { #game-preload,#menu-scene,#play { transition:none; } }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.185.0/build/three.module.js"
      }
    }
  </script>
</head>
<body>
  <iframe id="game-preload" title="My Cozy Island game" aria-hidden="true" tabindex="-1"></iframe>
  <canvas id="menu-scene" aria-label="A palm tree beneath a warm sky"></canvas>
  <button id="play" type="button" disabled aria-live="polite">Preparing 1%</button>
  <script type="module" src="./src/menu.js?v=three-palm-menu-1"></script>
</body>
</html>
