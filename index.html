<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>My Cozy Island</title>
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#f3cfa6;color:white;font-family:system-ui,sans-serif}
#game{position:fixed;inset:0;width:100%;height:100%;display:block}
#cloud-loader{position:fixed;left:50%;bottom:32px;transform:translateX(-50%);z-index:4;width:min(360px,70vw);padding:14px 16px;border-radius:18px;background:rgba(22,38,42,.72);transition:opacity .45s ease;pointer-events:none}
#cloud-loader-title{font-size:12px;font-weight:800;margin-bottom:8px}
#cloud-loader-track{height:8px;border-radius:999px;background:rgba(255,255,255,.22);overflow:hidden}
#cloud-loader-fill{height:100%;width:0%;border-radius:999px;background:white;transition:width .25s ease}
#error{position:fixed;left:16px;right:16px;bottom:16px;z-index:5;max-height:40vh;overflow:auto;white-space:pre-wrap;background:rgba(80,0,0,.82);padding:12px;border-radius:12px;color:white}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="cloud-loader"><div id="cloud-loader-title">Cozy Cloud Loading</div><div id="cloud-loader-track"><div id="cloud-loader-fill"></div></div></div>
<pre id="error" hidden></pre>
<script type="module" src="./src/main-cloudform.js?v=hero-cloud-2"></script>
</body>
</html>
