<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#b4ddd8">
  <meta name="description" content="A lightweight WebGPU postcard menu for My Cozy Island.">
  <title>My Cozy Island</title>
  <style>
    :root { color-scheme:dark; font-family:Inter,ui-rounded,"SF Pro Rounded",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:#b4ddd8; color:#24483f; }
    * { box-sizing:border-box; }
    html,body { width:100%; height:100%; margin:0; overflow:hidden; background:#b4ddd8; }
    body { overscroll-behavior:none; }
    button { font:inherit; }
    #game-preload,#menu-scene { position:fixed; inset:0; width:100%; height:100%; border:0; }
    #game-preload { z-index:1; opacity:0; pointer-events:none; transition:opacity .75s ease; background:#b4ddd8; }
    #menu-scene { z-index:2; display:block; transition:opacity .75s ease,filter .75s ease; }
    #play { position:fixed; left:50%; bottom:max(7vh,30px); z-index:3; min-width:190px; min-height:58px; padding:0 34px; border:1px solid rgba(255,255,255,.72); border-radius:999px; background:linear-gradient(180deg,#fff7c9,#efd98b); color:#31594f; box-shadow:0 14px 34px rgba(53,92,82,.2),inset 0 1px rgba(255,255,255,.94); font-size:15px; font-weight:850; letter-spacing:.035em; cursor:pointer; transform:translateX(-50%); transition:opacity .2s ease,transform .2s ease,filter .2s ease; }
    #play:hover:not(:disabled) { transform:translateX(-50%) translateY(-3px) scale(1.02); filter:brightness(1.035); }
    #play:active:not(:disabled) { transform:translateX(-50%) scale(.99); }
    #play:disabled { cursor:default; opacity:.6; }
    body.is-entering #game-preload { opacity:1; pointer-events:auto; }
    body.is-entering #menu-scene { opacity:0; filter:blur(6px); }
    body.is-entering #play { opacity:0; transform:translateX(-50%) translateY(12px); pointer-events:none; }
    @media (prefers-reduced-motion:reduce) { #game-preload,#menu-scene,#play { transition:none; } }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.185.0/build/three.webgpu.js",
        "three/webgpu": "https://cdn.jsdelivr.net/npm/three@0.185.0/build/three.webgpu.js",
        "three/tsl": "https://cdn.jsdelivr.net/npm/three@0.185.0/build/three.tsl.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.185.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <iframe id="game-preload" title="My Cozy Island game" aria-hidden="true" tabindex="-1"></iframe>
  <canvas id="menu-scene" aria-label="A palm tree above a soft tropical shoreline"></canvas>
  <button id="play" type="button" disabled aria-live="polite">Preparing 1%</button>
  <script type="module" src="./src/menu.js?v=alpha-frond-postcard-1"></script>
</body>
</html>
